[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
# npm install (em vez de npm ci): resolve dependências opcionais por plataforma
# (ex.: @emnapi/* p/ sharp no Linux) e não falha por lock-drift cross-platform.
# --include=dev é necessário porque NODE_ENV=production faria o npm omitir devDeps.
cmds = ["npm install --include=dev --no-audit --no-fund"]

[phases.build]
cmds = ["npm run build"]

[start]
# Sincroniza o schema, popula só se o banco estiver vazio (seed idempotente,
# não-fatal) e sobe o servidor na porta $PORT.
cmd = "npx prisma db push && (npm run db:seed || echo 'seed pulado') && npm run start"
