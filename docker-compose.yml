services:
  postgres:
    image: postgres:16-alpine
    container_name: zimmeros-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: zimmeros
      POSTGRES_PASSWORD: zimmeros
      POSTGRES_DB: zimmeros
    ports:
      - "5432:5432"
    volumes:
      - zimmeros-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zimmeros -d zimmeros"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  zimmeros-pgdata:
